<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Fuel pump silhouette, stylised -->
  <g transform="translate(120, 110)">
    <!-- Pump body -->
    <rect x="0" y="40" width="170" height="240" rx="18" fill="#f1f5f9"/>
    <!-- Display window -->
    <rect x="20" y="62" width="130" height="62" rx="8" fill="#0f172a"/>
    <!-- Digits -->
    <rect x="32" y="80" width="14" height="26" fill="url(#accent)"/>
    <rect x="54" y="80" width="14" height="26" fill="url(#accent)"/>
    <rect x="76" y="80" width="14" height="26" fill="url(#accent)"/>
    <rect x="104" y="80" width="14" height="26" fill="url(#accent)"/>
    <rect x="126" y="80" width="14" height="26" fill="url(#accent)"/>
    <!-- Pump handle slot -->
    <rect x="28" y="148" width="114" height="20" rx="6" fill="#0f172a"/>
    <!-- Base -->
    <rect x="10" y="260" width="150" height="20" rx="4" fill="#cbd5e1"/>
    <!-- Hose -->
    <path d="M170 140 Q 220 140 220 200 L 220 270"
      stroke="#0f172a" stroke-width="14" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Upward arrow with currency symbol indicating savings over time -->
  <g transform="translate(300, 280)">
    <circle cx="60" cy="60" r="72" fill="url(#accent)"/>
    <!-- Up arrow -->
    <path d="M60 28 L92 66 L72 66 L72 96 L48 96 L48 66 L28 66 Z" fill="#0f172a"/>
  </g>
</svg>
